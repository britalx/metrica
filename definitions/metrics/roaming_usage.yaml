metric_id: roaming_usage
name: Roaming Usage (Last 30 Days)
description: >
  Combined roaming minutes and data consumed in the last 30 days.
  High roaming may indicate travel patterns or dissatisfaction with home coverage.
domain: usage_behavior
owner: Data Engineering
refresh_cadence: daily
data_type: float
unit: minutes
version: 1
status: active
tags:
  - churn_feature
  - usage_behavior

source_mappings:
  - source_system: cdr
    source_table: cdr_call_records
    source_fields:
      - roaming_flag
    transformation: >
      SELECT customer_id,
             SUM(CASE WHEN is_roaming AND call_type = 'voice'
                      THEN duration_seconds / 60.0 ELSE 0 END) AS roaming_usage
      FROM raw.cdr_call_records
      WHERE call_date >= DATE '2026-02-13'
      GROUP BY customer_id
    target_table: metrics.customer_metrics
    target_column: roaming_usage

lineage:
  upstream_metrics: []
  upstream_cdes:
    - cdr.roaming_flag
  downstream_consumers:
    - ml_feature:roaming_usage
    - dashboard:usage_summary

dq_rules:
  - rule_id: roaming_usage_completeness
    name: All active customers have a roaming usage value
    dimension: completeness
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE roaming_usage IS NULL)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.90
    fail_threshold: 0.70

  - rule_id: roaming_usage_validity
    name: Roaming usage is non-negative
    dimension: validity
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE roaming_usage < 0)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.99
    fail_threshold: 0.95
