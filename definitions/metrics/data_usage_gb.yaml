metric_id: data_usage_gb
name: Monthly Data Consumption (GB)
description: >
  Total data consumption in gigabytes for the current billing month.
  Core usage metric — declining data usage is a leading churn indicator.
domain: usage_behavior
owner: Data Engineering
refresh_cadence: daily
data_type: float
unit: GB
version: 1
status: active
tags:
  - churn_feature
  - usage_behavior
  - ml_ready

source_mappings:
  - source_system: cdr
    source_table: cdr_call_records
    source_fields:
      - data_bytes
    transformation: >
      SELECT customer_id,
             SUM(data_bytes) / (1024.0 * 1024.0 * 1024.0) AS data_usage_gb
      FROM raw.cdr_call_records
      WHERE call_date >= DATE_TRUNC('month', DATE '2026-03-15')
      GROUP BY customer_id
    target_table: metrics.customer_metrics
    target_column: data_usage_gb

lineage:
  upstream_metrics: []
  upstream_cdes:
    - cdr.data_bytes_transferred
  downstream_consumers:
    - ml_feature:data_usage_gb
    - dashboard:usage_summary

dq_rules:
  - rule_id: data_usage_gb_completeness
    name: All active customers have a data usage value
    dimension: completeness
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE data_usage_gb IS NULL)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.95
    fail_threshold: 0.80

  - rule_id: data_usage_gb_validity
    name: Data usage is non-negative and within reasonable range
    dimension: validity
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE data_usage_gb < 0 OR data_usage_gb > 500)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.99
    fail_threshold: 0.95
