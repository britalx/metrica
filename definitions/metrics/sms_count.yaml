metric_id: sms_count
name: Monthly SMS Volume
description: >
  Total number of SMS messages sent by the customer in the current billing month.
  SMS usage patterns contribute to overall engagement scoring.
domain: usage_behavior
owner: Data Engineering
refresh_cadence: daily
data_type: integer
unit: count
version: 1
status: active
tags:
  - churn_feature
  - usage_behavior

source_mappings:
  - source_system: cdr
    source_table: cdr_call_records
    source_fields:
      - call_type
    transformation: >
      SELECT customer_id,
             SUM(CASE WHEN call_type = 'sms' THEN 1 ELSE 0 END) AS sms_count
      FROM raw.cdr_call_records
      WHERE call_date >= DATE_TRUNC('month', DATE '2026-03-15')
      GROUP BY customer_id
    target_table: metrics.customer_metrics
    target_column: sms_count

lineage:
  upstream_metrics: []
  upstream_cdes:
    - cdr.sms_event
  downstream_consumers:
    - ml_feature:sms_count
    - dashboard:usage_summary

dq_rules:
  - rule_id: sms_count_completeness
    name: All active customers have an SMS count value
    dimension: completeness
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE sms_count IS NULL)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.95
    fail_threshold: 0.80

  - rule_id: sms_count_validity
    name: SMS count is non-negative
    dimension: validity
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE sms_count < 0)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.99
    fail_threshold: 0.95
