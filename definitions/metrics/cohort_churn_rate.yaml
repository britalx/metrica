metric_id: cohort_churn_rate
name: Cohort Churn Rate
description: >
  Historical churn rate of customers in the same tenure band and plan tier cohort.
  Provides a baseline churn expectation for each customer segment.
domain: derived_engineered
owner: Data Science
refresh_cadence: monthly
data_type: float
unit: ratio
version: 1
status: active
tags:
  - churn_feature
  - derived
  - cohort

source_mappings:
  - source_system: crm
    source_table: crm_customers
    source_fields: []
    transformation: >
      -- PLACEHOLDER: Requires historical churn data and cohort mapping
      -- Real source would compute historical churn rates per tenure_band x plan_tier cohort
      -- and join back to each customer's cohort
      SELECT customer_id, NULL::FLOAT AS cohort_churn_rate
      FROM raw.crm_customers
    target_table: metrics.customer_metrics
    target_column: cohort_churn_rate

lineage:
  upstream_metrics:
    - tenure_months
    - plan_tier
  upstream_cdes: []
  downstream_consumers:
    - ml_feature:cohort_churn_rate
    - dashboard:churn_risk

dq_rules:
  - rule_id: cohort_churn_rate_completeness
    name: All customers have a cohort churn rate
    dimension: completeness
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE cohort_churn_rate IS NULL)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.70
    fail_threshold: 0.50

  - rule_id: cohort_churn_rate_validity
    name: Cohort churn rate is between 0 and 1
    dimension: validity
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE cohort_churn_rate < 0 OR cohort_churn_rate > 1)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.99
    fail_threshold: 0.95
