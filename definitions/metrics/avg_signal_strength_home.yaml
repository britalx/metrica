metric_id: avg_signal_strength_home
name: Average Signal Strength (Home)
description: >
  Average signal RSRP at the customer's home location in dBm.
  Poor home signal is a strong driver of network-related churn.
domain: network_quality
owner: Network Operations
refresh_cadence: daily
data_type: float
unit: dBm
version: 1
status: active
tags:
  - churn_feature
  - network
  - coverage

source_mappings:
  - source_system: network
    source_table: network_measurements
    source_fields:
      - rsrp
      - cell_id
    transformation: >
      SELECT customer_id,
             AVG(rsrp_dbm) AS avg_signal_strength_home
      FROM raw.network_measurements
      GROUP BY customer_id
    target_table: metrics.customer_metrics
    target_column: avg_signal_strength_home

lineage:
  upstream_metrics: []
  upstream_cdes:
    - network.rsrp
    - network.cell_id
  downstream_consumers:
    - ml_feature:avg_signal_strength_home
    - dashboard:network_quality

dq_rules:
  - rule_id: avg_signal_strength_home_completeness
    name: All customers have a signal strength value
    dimension: completeness
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE avg_signal_strength_home IS NULL)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.80
    fail_threshold: 0.60

  - rule_id: avg_signal_strength_home_validity
    name: RSRP is within valid range (-140 to -44 dBm)
    dimension: validity
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE avg_signal_strength_home < -140 OR avg_signal_strength_home > -44)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.99
    fail_threshold: 0.95
