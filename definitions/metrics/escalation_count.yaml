metric_id: escalation_count
name: Escalation Count (90 Days)
description: >
  Count of support interactions escalated to a supervisor in the last 90 days.
  Escalations indicate severe dissatisfaction and are a strong churn signal.
domain: customer_service
owner: Customer Support
refresh_cadence: daily
data_type: integer
unit: count
version: 1
status: active
tags:
  - churn_feature
  - support

source_mappings:
  - source_system: contact_center
    source_table: contact_center_interactions
    source_fields:
      - escalation_flag
    transformation: >
      SELECT customer_id,
             COUNT(*) FILTER (WHERE escalation_flag = TRUE) AS escalation_count
      FROM raw.contact_center_interactions
      WHERE interaction_date >= CURRENT_DATE - INTERVAL '90 days'
      GROUP BY customer_id
    target_table: metrics.customer_metrics
    target_column: escalation_count

lineage:
  upstream_metrics: []
  upstream_cdes:
    - contact_center.escalation_flag
  downstream_consumers:
    - ml_feature:escalation_count
    - dashboard:service_quality

dq_rules:
  - rule_id: escalation_count_completeness
    name: All customers have an escalation count
    dimension: completeness
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE escalation_count IS NULL)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.90
    fail_threshold: 0.70

  - rule_id: escalation_count_validity
    name: Escalation count is non-negative
    dimension: validity
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE escalation_count < 0)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.99
    fail_threshold: 0.95
