metric_id: data_throttling_events
name: Data Throttling Events (30 Days)
description: >
  Count of times the customer's data was throttled due to policy limits in the
  last 30 days. Frequent throttling signals plan mismatch and frustration.
domain: network_quality
owner: Network Operations
refresh_cadence: daily
data_type: integer
unit: count
version: 1
status: active
tags:
  - churn_feature
  - network

source_mappings:
  - source_system: network
    source_table: network_measurements
    source_fields:
      - throttle_flag
    transformation: >
      SELECT customer_id,
             SUM(CASE WHEN throttle_flag AND measured_at >= DATE '2026-02-13'
                      THEN 1 ELSE 0 END) AS data_throttling_events
      FROM raw.network_measurements
      GROUP BY customer_id
    target_table: metrics.customer_metrics
    target_column: data_throttling_events

lineage:
  upstream_metrics: []
  upstream_cdes:
    - network.throttle_events
  downstream_consumers:
    - ml_feature:data_throttling_events
    - dashboard:network_quality

dq_rules:
  - rule_id: data_throttling_events_completeness
    name: All customers have a throttling events count
    dimension: completeness
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE data_throttling_events IS NULL)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.80
    fail_threshold: 0.60

  - rule_id: data_throttling_events_validity
    name: Throttling events count is non-negative
    dimension: validity
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE data_throttling_events < 0)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.99
    fail_threshold: 0.95
