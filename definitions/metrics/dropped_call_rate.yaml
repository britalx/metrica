metric_id: dropped_call_rate
name: Dropped Call Rate (30 Days)
description: >
  Percentage of calls dropped in the last 30 days. High drop rates indicate
  network quality issues that frustrate customers and drive churn.
domain: network_quality
owner: Network Operations
refresh_cadence: daily
data_type: float
unit: ratio
version: 1
status: active
tags:
  - churn_feature
  - network

source_mappings:
  - source_system: cdr
    source_table: cdr_call_records
    source_fields:
      - drop_flag
    transformation: >
      SELECT customer_id,
             SUM(CASE WHEN is_dropped THEN 1 ELSE 0 END)::FLOAT
             / NULLIF(COUNT(*)::FLOAT, 0) AS dropped_call_rate
      FROM raw.cdr_call_records
      WHERE call_date >= DATE '2026-02-13'
      GROUP BY customer_id
    target_table: metrics.customer_metrics
    target_column: dropped_call_rate

lineage:
  upstream_metrics: []
  upstream_cdes:
    - cdr.drop_flag
  downstream_consumers:
    - ml_feature:dropped_call_rate
    - dashboard:network_quality

dq_rules:
  - rule_id: dropped_call_rate_completeness
    name: All customers with calls have a drop rate
    dimension: completeness
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE dropped_call_rate IS NULL)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.80
    fail_threshold: 0.60

  - rule_id: dropped_call_rate_validity
    name: Drop rate is between 0 and 1
    dimension: validity
    check_expression: >
      SELECT 1.0 - (COUNT(*) FILTER (WHERE dropped_call_rate < 0 OR dropped_call_rate > 1)::FLOAT / NULLIF(COUNT(*),0))
      FROM metrics.customer_metrics
    warn_threshold: 0.99
    fail_threshold: 0.95
